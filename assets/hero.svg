<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 560" role="img" aria-label="Cascada — copy trading desktop app">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#0E1A35"/>
    </linearGradient>
    <linearGradient id="logoBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#BAE6FD"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1600" height="560" fill="url(#sky)"/>

  <!-- Ambient cascade waves -->
  <g opacity="0.55">
    <path d="M0 380 C 240 300, 480 460, 800 380 S 1360 300, 1600 380 L 1600 560 L 0 560 Z" fill="url(#wave)"/>
    <path d="M0 430 C 240 360, 480 500, 800 430 S 1360 360, 1600 430 L 1600 560 L 0 560 Z" fill="url(#wave)" opacity="0.6"/>
  </g>

  <!-- Logo -->
  <g transform="translate(110 120)" filter="url(#glow)">
    <rect width="180" height="180" rx="42" fill="url(#logoBg)"/>
    <rect x="24" y="51" width="92" height="17" rx="8" fill="url(#bar)" opacity="0.75"/>
    <rect x="42" y="82" width="92" height="17" rx="8" fill="url(#bar)" opacity="0.88"/>
    <rect x="60" y="113" width="92" height="17" rx="8" fill="url(#bar)"/>
  </g>

  <!-- Wordmark -->
  <g font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, sans-serif" fill="#F8FAFC">
    <text x="340" y="210" font-size="104" font-weight="700" letter-spacing="-3">Cascada</text>
    <text x="346" y="262" font-size="26" font-weight="500" fill="#94A3B8">Copy trading desktop, made local.</text>
  </g>

  <!-- Feature chips -->
  <g font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, sans-serif" font-size="18" font-weight="600">
    <g transform="translate(340 320)">
      <rect width="158" height="46" rx="23" fill="#0EA5E9" opacity="0.18" stroke="#38BDF8" stroke-opacity="0.6"/>
      <text x="79" y="30" fill="#BAE6FD" text-anchor="middle">cTrader</text>
    </g>
    <g transform="translate(512 320)">
      <rect width="158" height="46" rx="23" fill="#0EA5E9" opacity="0.18" stroke="#38BDF8" stroke-opacity="0.6"/>
      <text x="79" y="30" fill="#BAE6FD" text-anchor="middle">MetaTrader 4</text>
    </g>
    <g transform="translate(684 320)">
      <rect width="158" height="46" rx="23" fill="#0EA5E9" opacity="0.18" stroke="#38BDF8" stroke-opacity="0.6"/>
      <text x="79" y="30" fill="#BAE6FD" text-anchor="middle">MetaTrader 5</text>
    </g>
    <g transform="translate(340 384)">
      <rect width="194" height="46" rx="23" fill="#10B981" opacity="0.16" stroke="#34D399" stroke-opacity="0.6"/>
      <text x="97" y="30" fill="#A7F3D0" text-anchor="middle">Local &amp; private</text>
    </g>
    <g transform="translate(548 384)">
      <rect width="190" height="46" rx="23" fill="#6366F1" opacity="0.18" stroke="#818CF8" stroke-opacity="0.6"/>
      <text x="95" y="30" fill="#C7D2FE" text-anchor="middle">No cloud, no account</text>
    </g>
    <g transform="translate(752 384)">
      <rect width="170" height="46" rx="23" fill="#F59E0B" opacity="0.18" stroke="#FBBF24" stroke-opacity="0.6"/>
      <text x="85" y="30" fill="#FDE68A" text-anchor="middle">Tauri 2 + Rust</text>
    </g>
  </g>

  <!-- Mini live mockup panel on the right -->
  <g transform="translate(1020 100)">
    <rect width="480" height="360" rx="18" fill="#0F1B38" stroke="#1E293B"/>
    <!-- sidebar -->
    <rect width="130" height="360" rx="18" fill="#111E3F"/>
    <g fill="#64748B" font-family="ui-sans-serif, -apple-system" font-size="12">
      <circle cx="22" cy="32" r="7" fill="url(#logoBg)"/>
      <text x="40" y="36" fill="#E2E8F0" font-weight="700">Cascada</text>
      <rect x="14" y="66" width="100" height="26" rx="6" fill="#1E3A8A" opacity="0.5"/>
      <text x="26" y="84" fill="#93C5FD">Dashboard</text>
      <text x="26" y="114" fill="#94A3B8">Accounts</text>
      <text x="26" y="142" fill="#94A3B8">Copy rules</text>
      <text x="26" y="170" fill="#94A3B8">Trades</text>
      <text x="26" y="198" fill="#94A3B8">Compare</text>
      <text x="26" y="226" fill="#94A3B8">Logs</text>
    </g>
    <!-- content: 4 KPI tiles -->
    <g transform="translate(150 24)">
      <g>
        <rect width="148" height="70" rx="10" fill="#0B1533" stroke="#1E293B"/>
        <text x="14" y="26" fill="#64748B" font-size="11" font-family="ui-sans-serif, -apple-system">TOTAL EQUITY</text>
        <text x="14" y="54" fill="#F8FAFC" font-size="22" font-weight="700" font-family="ui-sans-serif, -apple-system">24 812.40</text>
      </g>
      <g transform="translate(160 0)">
        <rect width="148" height="70" rx="10" fill="#0B1533" stroke="#1E293B"/>
        <text x="14" y="26" fill="#64748B" font-size="11" font-family="ui-sans-serif, -apple-system">ACCOUNTS</text>
        <text x="14" y="54" fill="#F8FAFC" font-size="22" font-weight="700" font-family="ui-sans-serif, -apple-system">3 / 3</text>
      </g>
    </g>
    <!-- mini trades row -->
    <g transform="translate(150 118)" font-family="ui-sans-serif, -apple-system" font-size="11">
      <text x="0" y="0" fill="#E2E8F0" font-weight="600" font-size="13">Recent activity</text>
      <g transform="translate(0 18)">
        <rect width="308" height="56" rx="8" fill="#0B1533" stroke="#1E293B"/>
        <rect x="10" y="10" width="34" height="16" rx="4" fill="#10B981" opacity="0.2"/>
        <text x="27" y="22" fill="#6EE7B7" text-anchor="middle" font-size="10" font-weight="700">BUY</text>
        <text x="54" y="22" fill="#E2E8F0" font-weight="600">EURUSD</text>
        <text x="54" y="42" fill="#64748B">0.50 @ 1.0912</text>
        <text x="288" y="42" fill="#6EE7B7" text-anchor="end" font-weight="700">+21.40</text>
      </g>
      <g transform="translate(0 84)">
        <rect width="308" height="56" rx="8" fill="#0B1533" stroke="#1E293B"/>
        <rect x="10" y="10" width="34" height="16" rx="4" fill="#EF4444" opacity="0.2"/>
        <text x="27" y="22" fill="#FCA5A5" text-anchor="middle" font-size="10" font-weight="700">SELL</text>
        <text x="54" y="22" fill="#E2E8F0" font-weight="600">XAUUSD</text>
        <text x="54" y="42" fill="#64748B">0.10 @ 2 342.10</text>
        <text x="288" y="42" fill="#FCA5A5" text-anchor="end" font-weight="700">−8.70</text>
      </g>
      <g transform="translate(0 150)">
        <rect width="308" height="56" rx="8" fill="#0B1533" stroke="#1E293B"/>
        <rect x="10" y="10" width="34" height="16" rx="4" fill="#10B981" opacity="0.2"/>
        <text x="27" y="22" fill="#6EE7B7" text-anchor="middle" font-size="10" font-weight="700">BUY</text>
        <text x="54" y="22" fill="#E2E8F0" font-weight="600">USDJPY</text>
        <text x="54" y="42" fill="#64748B">0.30 @ 151.83</text>
        <text x="288" y="42" fill="#6EE7B7" text-anchor="end" font-weight="700">+12.05</text>
      </g>
    </g>
  </g>
</svg>
