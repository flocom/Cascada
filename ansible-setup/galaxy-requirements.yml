# Use mt-runner's dev branch — its transitive deps point to the dev
# branches of ansible-role-metatrader / ansible-role-wine / etc., which
# are what EA31337 actually uses in their own CI. The master branches
# are stale and their `become: sudo` handling trips GitHub runners.
---
roles:
  - name: ea31337.mt_runner
    scm: git
    src: https://github.com/EA31337/ansible-role-mt-runner.git
    version: dev
