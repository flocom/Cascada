name: Compile EAs

# Auto-compile MQL4 and MQL5 sources whenever they change. MetaEditor that
# ships with MT5 compiles both `.mq5` and `.mq4`, so we install MT5 once per
# runner and use its `metaeditor64.exe` for both jobs. Output is committed
# back to `ea/<plat>/compiled/` with `[skip ci]` so we don't re-trigger.
#
# cTrader's `.algo` is not auto-built — Spotware only ships build through the
# Automate UI. The prebuilt stays manually maintained in ea/ctrader/prebuilt/.

on:
  push:
    paths:
      - 'ea/mt4/CascadaBridge.mq4'
      - 'ea/mt5/CascadaBridge.mq5'
      - '.github/workflows/compile-eas.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download MT5 setup
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri 'https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe' `
            -OutFile 'mt5setup.exe' `
            -UseBasicParsing
          Write-Host "Downloaded $( (Get-Item mt5setup.exe).Length ) bytes"

      - name: Silent-install MT5
        shell: pwsh
        run: |
          # MT5 setup is an Inno Setup installer — /VERYSILENT suppresses
          # dialogs, /NORESTART avoids a reboot prompt.
          $p = Start-Process -FilePath '.\mt5setup.exe' `
                             -ArgumentList '/VERYSILENT','/NORESTART' `
                             -PassThru -Wait
          Write-Host "Installer exit code: $($p.ExitCode)"
          # Installer auto-launches terminal64.exe — kill it before metaeditor
          # runs so it doesn't hold handles on MQL5\Include.
          Get-Process -Name terminal64 -ErrorAction SilentlyContinue | Stop-Process -Force

      - name: Seed MQL5 includes by launching terminal once
        shell: pwsh
        run: |
          # First launch populates C:\Program Files\MetaTrader 5\MQL5\Include
          # with Trade\Trade.mqh etc. We wait ~15 s then kill — long enough for
          # the terminal to unpack its includes, short enough to keep CI cheap.
          $t = 'C:\Program Files\MetaTrader 5\terminal64.exe'
          if (Test-Path $t) {
            Start-Process -FilePath $t -ArgumentList '/portable' -PassThru | Out-Null
            Start-Sleep -Seconds 15
            Get-Process -Name terminal64 -ErrorAction SilentlyContinue | Stop-Process -Force
          }
          $inc = 'C:\Program Files\MetaTrader 5\MQL5\Include'
          if (Test-Path $inc) {
            Write-Host "Include dir OK, contents:"
            Get-ChildItem -Path $inc -Depth 1 | Select-Object -First 20 | Format-Table -AutoSize
          } else {
            Write-Host "::warning::MQL5\Include still missing after terminal seed"
          }

      - name: Locate metaeditor64.exe
        id: loc
        shell: pwsh
        run: |
          $candidates = @(
            'C:\Program Files\MetaTrader 5\metaeditor64.exe',
            'C:\Program Files (x86)\MetaTrader 5\metaeditor64.exe'
          )
          $found = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $found) {
            $found = (Get-ChildItem -Path 'C:\' -Recurse -Filter 'metaeditor64.exe' -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          }
          if (-not $found) { throw 'metaeditor64.exe not found anywhere' }
          Write-Host "MetaEditor: $found"
          "path=$found" >> $env:GITHUB_OUTPUT

      - name: Compile MQL5 → .ex5
        shell: pwsh
        run: |
          $me  = '${{ steps.loc.outputs.path }}'
          $src = "$pwd\ea\mt5\CascadaBridge.mq5"
          $log = "$pwd\mq5.log"
          # /s = syntax only? no — in MetaEditor CLI there's no silent flag;
          # metaeditor always writes logs to /log path. Exit code is 0 on
          # warnings-only, non-zero on errors. We check the .ex5 presence.
          # metaeditor writes its log next to the source as `<name>.log`.
          # /log enables that file; no path argument is supported.
          & $me /compile:"$src" /log
          $autoLog = [IO.Path]::ChangeExtension($src, '.log')
          if (Test-Path $autoLog) { Write-Host "--- metaeditor log ---"; Get-Content $autoLog }
          elseif (Test-Path $log) { Write-Host "--- log ---"; Get-Content $log }
          if (-not (Test-Path "$pwd\ea\mt5\CascadaBridge.ex5")) {
            throw 'compilation failed: no .ex5 produced'
          }

      - name: Compile MQL4 → .ex4
        shell: pwsh
        run: |
          $me  = '${{ steps.loc.outputs.path }}'
          $src = "$pwd\ea\mt4\CascadaBridge.mq4"
          $log = "$pwd\mq4.log"
          # metaeditor writes its log next to the source as `<name>.log`.
          # /log enables that file; no path argument is supported.
          & $me /compile:"$src" /log
          $autoLog = [IO.Path]::ChangeExtension($src, '.log')
          if (Test-Path $autoLog) { Write-Host "--- metaeditor log ---"; Get-Content $autoLog }
          elseif (Test-Path $log) { Write-Host "--- log ---"; Get-Content $log }
          if (-not (Test-Path "$pwd\ea\mt4\CascadaBridge.ex4")) {
            throw 'compilation failed: no .ex4 produced'
          }

      - name: Stage compiled binaries
        shell: bash
        run: |
          set -e
          mkdir -p ea/mt5/compiled ea/mt4/compiled
          mv -f ea/mt5/CascadaBridge.ex5 ea/mt5/compiled/CascadaBridge.ex5
          mv -f ea/mt4/CascadaBridge.ex4 ea/mt4/compiled/CascadaBridge.ex4

      - name: Commit + push if changed
        shell: bash
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ea/mt5/compiled/CascadaBridge.ex5 ea/mt4/compiled/CascadaBridge.ex4
          if git diff --staged --quiet; then
            echo "No binary change — skipping commit."
            exit 0
          fi
          git commit -m "ci: recompile CascadaBridge.ex4 / .ex5 [skip ci]"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"
