name: Compile EAs

# Wine-based MT install on ubuntu-latest, driven by an Ansible role that
# handles the stdlib + includes unpack step headless (the Windows installer
# silently no-ops on that step because the terminal never completes its
# broker-server handshake on a CI runner). Same recipe EA31337 uses for
# their own MT4/MT5 EA compilation.
#
# cTrader `.algo` stays manual — Spotware only ships build via Automate UI.

on:
  push:
    paths:
      - 'ea/mt4/CascadaBridge.mq4'
      - 'ea/mt5/CascadaBridge.mq5'
      - '.github/workflows/compile-eas.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile-mt5:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MT5 (Wine) via Ansible
        uses: dawidd6/action-ansible-playbook@v2
        with:
          playbook: install-mt5.yml
          directory: ansible-setup
          options: |
            --connection local
            --inventory localhost,
          requirements: galaxy-requirements.yml

      - name: Compile CascadaBridge.mq5 → .ex5
        uses: fx31337/mql-compile-action@dev
        with:
          path: ea/mt5/CascadaBridge.mq5
          mt-path: ${{ github.workspace }}/../../../.wine/drive_c
          verbose: true

      - name: Stage + commit .ex5
        run: |
          set -e
          mkdir -p ea/mt5/compiled
          if [ ! -f ea/mt5/CascadaBridge.ex5 ]; then
            echo "::error::No .ex5 produced"
            exit 1
          fi
          mv -f ea/mt5/CascadaBridge.ex5 ea/mt5/compiled/CascadaBridge.ex5
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ea/mt5/compiled/CascadaBridge.ex5
          if git diff --staged --quiet; then
            echo "No change in .ex5"
          else
            git commit -m "ci: recompile CascadaBridge.ex5 [skip ci]"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin HEAD:"${GITHUB_REF_NAME}"
          fi

  compile-mt4:
    runs-on: ubuntu-latest
    needs: compile-mt5
    if: ${{ !cancelled() }}
    steps:
      - uses: actions/checkout@v4

      - name: Pull any commits the MT5 job pushed
        run: git pull --rebase origin "${GITHUB_REF_NAME}"

      - name: Install MT4 (Wine) via Ansible
        uses: dawidd6/action-ansible-playbook@v2
        with:
          playbook: install-mt4.yml
          directory: ansible-setup
          options: |
            --connection local
            --inventory localhost,
          requirements: galaxy-requirements.yml

      - name: Compile CascadaBridge.mq4 → .ex4
        uses: fx31337/mql-compile-action@dev
        with:
          path: ea/mt4/CascadaBridge.mq4
          mt-path: ${{ github.workspace }}/../../../.wine/drive_c
          verbose: true

      - name: Stage + commit .ex4
        run: |
          set -e
          mkdir -p ea/mt4/compiled
          if [ ! -f ea/mt4/CascadaBridge.ex4 ]; then
            echo "::error::No .ex4 produced"
            exit 1
          fi
          mv -f ea/mt4/CascadaBridge.ex4 ea/mt4/compiled/CascadaBridge.ex4
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ea/mt4/compiled/CascadaBridge.ex4
          if git diff --staged --quiet; then
            echo "No change in .ex4"
          else
            git commit -m "ci: recompile CascadaBridge.ex4 [skip ci]"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin HEAD:"${GITHUB_REF_NAME}"
          fi
