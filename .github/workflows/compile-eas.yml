name: Compile EAs

# Auto-compile the MQL4 and MQL5 sources whenever they change, so the
# pre-compiled `.ex4` / `.ex5` in `ea/*/compiled/` stay in sync with the
# source the end-user app ships. Each job:
#   1. Downloads the corresponding MetaTrader terminal (silent install)
#   2. Invokes metaeditor in CLI mode (`/compile`)
#   3. Commits the resulting binary back to `ea/<plat>/compiled/`
# Commits use `[skip ci]` so the push doesn't retrigger this workflow.
#
# cTrader's `.algo` is not auto-built here: Spotware doesn't ship a headless
# build path that produces a signed `.algo` — it has to come out of cTrader
# Automate's UI. We keep `ea/ctrader/prebuilt/CascadaBridge.algo` manually.

on:
  push:
    paths:
      - 'ea/mt4/CascadaBridge.mq4'
      - 'ea/mt5/CascadaBridge.mq5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile-mt5:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile CascadaBridge.mq5
        uses: fx31337/mql-compile-action@master
        with:
          path: ea/mt5/CascadaBridge.mq5
          mt-version: 5
          include: .
          verbose: true

      - name: Move .ex5 into compiled/
        shell: bash
        run: |
          set -e
          mkdir -p ea/mt5/compiled
          if [ -f ea/mt5/CascadaBridge.ex5 ]; then
            mv -f ea/mt5/CascadaBridge.ex5 ea/mt5/compiled/CascadaBridge.ex5
            echo "compiled_ok=1" >> "$GITHUB_ENV"
          else
            echo "::warning::metaeditor produced no .ex5 — compilation likely failed"
            exit 1
          fi

      - name: Commit result
        if: env.compiled_ok == '1'
        shell: bash
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ea/mt5/compiled/CascadaBridge.ex5
          if git diff --staged --quiet; then
            echo "No change in .ex5"
          else
            git commit -m "ci: recompile CascadaBridge.ex5 [skip ci]"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin HEAD:"${GITHUB_REF_NAME}"
          fi

  compile-mt4:
    runs-on: windows-latest
    # Run after MT5 so they don't race on git-push of the same branch.
    needs: compile-mt5
    if: ${{ !cancelled() }}
    steps:
      - uses: actions/checkout@v4

      - name: Pull any commits MT5 job pushed
        shell: bash
        run: git pull --rebase origin "${GITHUB_REF_NAME}"

      - name: Compile CascadaBridge.mq4
        uses: fx31337/mql-compile-action@master
        with:
          path: ea/mt4/CascadaBridge.mq4
          mt-version: 4
          include: .
          verbose: true

      - name: Move .ex4 into compiled/
        shell: bash
        run: |
          set -e
          mkdir -p ea/mt4/compiled
          if [ -f ea/mt4/CascadaBridge.ex4 ]; then
            mv -f ea/mt4/CascadaBridge.ex4 ea/mt4/compiled/CascadaBridge.ex4
            echo "compiled_ok=1" >> "$GITHUB_ENV"
          else
            echo "::warning::metaeditor produced no .ex4 — compilation likely failed"
            exit 1
          fi

      - name: Commit result
        if: env.compiled_ok == '1'
        shell: bash
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ea/mt4/compiled/CascadaBridge.ex4
          if git diff --staged --quiet; then
            echo "No change in .ex4"
          else
            git commit -m "ci: recompile CascadaBridge.ex4 [skip ci]"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin HEAD:"${GITHUB_REF_NAME}"
          fi
