name: Compile EAs

# windows-latest + official MetaQuotes installer. The 5 gotchas:
#   1. /auto installs silently (NOT Inno Setup — custom wrapper).
#   2. metaeditor64.exe is a GUI app: `& editor ...` returns IMMEDIATELY.
#      Use `Start-Process -Wait -PassThru -NoNewWindow` so PowerShell
#      actually blocks until compile exits — otherwise the next step
#      reads `.ex5` before it's been written.
#   3. Exit code = (errors + warnings), not 0/1. Don't fail on non-zero;
#      Test-Path the expected output binary instead.
#   4. MetaEditor's log file is UTF-16 LE + BOM. `Get-Content` defaults
#      to ANSI and garbles it. Use `-Encoding Unicode -Raw`.
#   5. Pass args as a string array with backslash paths.
#
# MetaEditor that ships with MT5 compiles both .mq5 AND .mq4, so one
# install covers both jobs. cTrader `.algo` stays manual (Spotware UI).

on:
  push:
    paths:
      - 'ea/mt4/CascadaBridge.mq4'
      - 'ea/mt5/CascadaBridge.mq5'
      - '.github/workflows/compile-eas.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download MT5 setup
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri 'https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe' `
            -OutFile 'mt5setup.exe' `
            -UseBasicParsing

      - name: Silent-install MT5 (/auto)
        shell: pwsh
        run: |
          Start-Process -FilePath '.\mt5setup.exe' -ArgumentList '/auto' -Wait
          # Installer spawns terminal64 — kill it so it doesn't hold
          # handles on MQL5\Include while metaeditor compiles.
          Get-Process -Name terminal64 -ErrorAction SilentlyContinue | Stop-Process -Force
          if (-not (Test-Path 'C:\Program Files\MetaTrader 5\metaeditor64.exe')) {
            throw 'metaeditor64.exe missing — install failed'
          }

      - name: Seed MQL5 stdlib (Trade\*.mqh)
        shell: pwsh
        run: |
          # MT5's silent installer doesn't unpack the MQL5 standard library
          # (Trade\Trade.mqh etc.) — that normally happens when terminal64
          # connects to a broker for the first time, which never succeeds
          # on a headless runner. Drop the files into both candidate include
          # paths (install + per-user data folder) from mskelton/mql5's
          # ISC-licensed mirror so MetaEditor resolves them.
          git clone --depth 1 https://github.com/mskelton/mql5.git '.mql5-stdlib'
          $srcInc = Join-Path $PWD '.mql5-stdlib\Include'
          $destInstall = 'C:\Program Files\MetaTrader 5\MQL5\Include'
          New-Item -ItemType Directory -Force -Path $destInstall | Out-Null
          Copy-Item -Path "$srcInc\*" -Destination $destInstall -Recurse -Force
          Write-Host "Seeded $destInstall"
          # Also populate the per-user Terminal hash folder MetaEditor tends
          # to query. Create one if none exists yet.
          $termRoot = 'C:\Users\runneradmin\AppData\Roaming\MetaQuotes\Terminal'
          New-Item -ItemType Directory -Force -Path $termRoot | Out-Null
          $termDir  = Get-ChildItem $termRoot -Directory -ErrorAction SilentlyContinue |
                      Where-Object { $_.Name -match '^[0-9A-F]{32}$' } | Select-Object -First 1
          if (-not $termDir) {
            $h = -join ((1..32) | ForEach-Object { '{0:X}' -f (Get-Random -Min 0 -Max 16) })
            $termDir = New-Item -ItemType Directory -Path (Join-Path $termRoot $h)
          }
          $destUser = Join-Path $termDir.FullName 'MQL5\Include'
          New-Item -ItemType Directory -Force -Path $destUser | Out-Null
          Copy-Item -Path "$srcInc\*" -Destination $destUser -Recurse -Force
          Write-Host "Seeded $destUser"

          # mskelton/mql5 is a 2023 snapshot; its CTrade / CPositionInfo /
          # COrderInfo destructors are declared as `~C…(void);` without an
          # inline body, but the .cpp bodies that used to live in MT5 are
          # not shipped. Modern MT5 headers use `~C…(void) {}` inline; patch
          # that in place so the compiler has a body.
          foreach ($target in @($destInstall, $destUser)) {
            foreach ($name in @('Trade\Trade.mqh','Trade\PositionInfo.mqh','Trade\OrderInfo.mqh')) {
              $p = Join-Path $target $name
              if (-not (Test-Path $p)) { continue }
              # mskelton/mql5 files are plain ASCII/UTF-8 without BOM —
              # read/write in UTF-8 so the regex sees real characters
              # (previous attempt read as UTF-16 → garbled → no match).
              $text = [System.IO.File]::ReadAllText($p, [System.Text.UTF8Encoding]::new($false))
              $new  = [Regex]::Replace($text, '(~[A-Za-z_]\w*\(\s*void\s*\))\s*;', '$1 {}')
              if ($new -ne $text) {
                [System.IO.File]::WriteAllText($p, $new, [System.Text.UTF8Encoding]::new($false))
                Write-Host "Patched destructors in $p"
              } else {
                Write-Host "::warning::No destructor match in $p — check encoding"
              }
            }
          }

      - name: Convert sources to UTF-16 LE + BOM (MetaEditor native)
        shell: pwsh
        run: |
          # MetaEditor defaults to ANSI/CP1252 when no BOM is present. Our
          # sources use em-dashes (—) in comments, which are 3-byte UTF-8
          # sequences. Read as ANSI they shift column indexes → the parser
          # reports bogus "unexpected token" errors on perfectly valid MQL.
          # Rewriting in UTF-16 LE with BOM = MetaEditor's own save format,
          # zero ambiguity.
          foreach ($path in @('ea\mt5\CascadaBridge.mq5', 'ea\mt4\CascadaBridge.mq4')) {
            $full    = Join-Path $PWD $path
            $content = Get-Content -Path $full -Raw -Encoding UTF8
            $u16bom  = New-Object System.Text.UnicodeEncoding($false, $true)
            [System.IO.File]::WriteAllText($full, $content, $u16bom)
            Write-Host "Re-encoded $path ($(((Get-Item $full).Length)) bytes)"
          }

      - name: Compile CascadaBridge.mq5 → .ex5
        shell: pwsh
        run: |
          $editor = 'C:\Program Files\MetaTrader 5\metaeditor64.exe'
          $src    = Join-Path $PWD 'ea\mt5\CascadaBridge.mq5'
          $log    = Join-Path $PWD 'mq5.log'
          # metaeditor is a GUI app — -Wait is MANDATORY, otherwise
          # PowerShell returns before the compile is done.
          $p = Start-Process -FilePath $editor `
                             -ArgumentList "/compile:$src","/log:$log" `
                             -Wait -PassThru -NoNewWindow
          Write-Host "metaeditor exit code: $($p.ExitCode) (= warnings+errors; check .ex5 for real status)"
          if (Test-Path $log) {
            Write-Host "--- metaeditor log ---"
            Get-Content -Path $log -Encoding Unicode -Raw
          }
          if (-not (Test-Path 'ea\mt5\CascadaBridge.ex5')) {
            throw 'compile failed: no .ex5 produced'
          }

      - name: Compile CascadaBridge.mq4 → .ex4
        shell: pwsh
        run: |
          $editor = 'C:\Program Files\MetaTrader 5\metaeditor64.exe'
          $src    = Join-Path $PWD 'ea\mt4\CascadaBridge.mq4'
          $log    = Join-Path $PWD 'mq4.log'
          $p = Start-Process -FilePath $editor `
                             -ArgumentList "/compile:$src","/log:$log" `
                             -Wait -PassThru -NoNewWindow
          Write-Host "metaeditor exit code: $($p.ExitCode)"
          if (Test-Path $log) {
            Write-Host "--- metaeditor log ---"
            Get-Content -Path $log -Encoding Unicode -Raw
          }
          if (-not (Test-Path 'ea\mt4\CascadaBridge.ex4')) {
            throw 'compile failed: no .ex4 produced'
          }

      - name: Stage compiled binaries
        shell: bash
        run: |
          set -e
          mkdir -p ea/mt5/compiled ea/mt4/compiled
          mv -f ea/mt5/CascadaBridge.ex5 ea/mt5/compiled/CascadaBridge.ex5
          mv -f ea/mt4/CascadaBridge.ex4 ea/mt4/compiled/CascadaBridge.ex4

      - name: Commit + push if changed
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ea/mt5/compiled/CascadaBridge.ex5 ea/mt4/compiled/CascadaBridge.ex4
          if git diff --staged --quiet; then
            echo "No binary change — skipping commit."
            exit 0
          fi
          git commit -m "ci: recompile CascadaBridge.ex4 / .ex5 [skip ci]"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"
