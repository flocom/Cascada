name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: ubuntu-latest
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev

      - name: Install npm deps
        run: npm ci

      - name: Build & release with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Minisign keypair that signs update artifacts (latest.json, .sig
          # files). The matching public key is baked into the app via
          # tauri.conf.json → plugins.updater.pubkey, so only builds signed
          # with THIS private key will be accepted as updates.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Cascada ${{ github.ref_name }}'
          releaseBody: |
            ## Downloads

            Pick the installer for your platform below.

            - **macOS** — `Cascada_*_universal.dmg` (Intel + Apple Silicon)
            - **Windows** — `Cascada_*_x64-setup.exe` or `.msi`
            - **Linux** — `.AppImage` (portable), `.deb` (Debian/Ubuntu) or `.rpm` (Fedora/openSUSE)

            ### First-launch guide (unsigned build)

            - **macOS** → right-click the app → *Open* → confirm. If Gatekeeper blocks: `xattr -d com.apple.quarantine /Applications/Cascada.app`. Grant **Full Disk Access** once to silence the "access data from other apps" prompt.
            - **Windows** → SmartScreen: *More info* → *Run anyway*.
            - **Linux** AppImage → `chmod +x Cascada_*.AppImage && ./Cascada_*.AppImage`.

            Full install walk-through: see the [README](https://github.com/flocom/Cascada#running-an-unsigned-build).
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
