name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Compile MT4 / MT5 EAs on a Windows runner and publish them as an
  # artifact so every matrix build below embeds the freshly-compiled
  # binaries via `include_bytes!`. Previously this ran only on branch
  # pushes (compile-eas.yml) and auto-committed back to main, which
  # meant a tag pushed at the same time as a source change bundled
  # STALE .ex4 / .ex5 into the release. Doing it up-front here
  # guarantees the release always ships a matching pair.
  # cTrader `.algo` is proprietary (signed container) and cannot be
  # compiled headlessly — committed manually in ea/ctrader/prebuilt/.
  compile-eas:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download MT5 setup
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri 'https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe' `
            -OutFile 'mt5setup.exe' `
            -UseBasicParsing

      - name: Silent-install MT5 (/auto)
        shell: pwsh
        run: |
          Start-Process -FilePath '.\mt5setup.exe' -ArgumentList '/auto' -Wait
          Get-Process -Name terminal64 -ErrorAction SilentlyContinue | Stop-Process -Force
          if (-not (Test-Path 'C:\Program Files\MetaTrader 5\metaeditor64.exe')) {
            throw 'metaeditor64.exe missing — install failed'
          }

      - name: Seed MQL5 stdlib (Trade\*.mqh)
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/terencebeauj/Trading_bot_BollingerBands.git '.mql5-stdlib'
          $srcInc = Join-Path $PWD '.mql5-stdlib\Include'
          $destInstall = 'C:\Program Files\MetaTrader 5\MQL5\Include'
          New-Item -ItemType Directory -Force -Path $destInstall | Out-Null
          Copy-Item -Path "$srcInc\*" -Destination $destInstall -Recurse -Force
          $termRoot = 'C:\Users\runneradmin\AppData\Roaming\MetaQuotes\Terminal'
          New-Item -ItemType Directory -Force -Path $termRoot | Out-Null
          $termDir  = Get-ChildItem $termRoot -Directory -ErrorAction SilentlyContinue |
                      Where-Object { $_.Name -match '^[0-9A-F]{32}$' } | Select-Object -First 1
          if (-not $termDir) {
            $h = -join ((1..32) | ForEach-Object { '{0:X}' -f (Get-Random -Min 0 -Max 16) })
            $termDir = New-Item -ItemType Directory -Path (Join-Path $termRoot $h)
          }
          $destUser = Join-Path $termDir.FullName 'MQL5\Include'
          New-Item -ItemType Directory -Force -Path $destUser | Out-Null
          Copy-Item -Path "$srcInc\*" -Destination $destUser -Recurse -Force

      - name: Convert sources to UTF-16 LE + BOM (MetaEditor native)
        shell: pwsh
        run: |
          foreach ($path in @('ea\mt5\CascadaBridge.mq5', 'ea\mt4\CascadaBridge.mq4')) {
            $full    = Join-Path $PWD $path
            $content = Get-Content -Path $full -Raw -Encoding UTF8
            $u16bom  = New-Object System.Text.UnicodeEncoding($false, $true)
            [System.IO.File]::WriteAllText($full, $content, $u16bom)
          }

      - name: Compile CascadaBridge.mq5 → .ex5
        shell: pwsh
        run: |
          $editor = 'C:\Program Files\MetaTrader 5\metaeditor64.exe'
          $src    = Join-Path $PWD 'ea\mt5\CascadaBridge.mq5'
          $log    = Join-Path $PWD 'mq5.log'
          $p = Start-Process -FilePath $editor `
                             -ArgumentList "/compile:$src","/log:$log" `
                             -Wait -PassThru -NoNewWindow
          Write-Host "metaeditor exit code: $($p.ExitCode)"
          if (Test-Path $log) { Get-Content -Path $log -Encoding Unicode -Raw }
          if (-not (Test-Path 'ea\mt5\CascadaBridge.ex5')) {
            throw 'compile failed: no .ex5 produced'
          }

      - name: Download + silent-install MT4 (XM setup — MetaQuotes CDN)
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri 'https://download.mql5.com/cdn/web/3315/mt4/xm4setup.exe' `
                            -OutFile 'mt4setup.exe' -UseBasicParsing
          Start-Process -FilePath '.\mt4setup.exe' -ArgumentList '/auto' -Wait
          Get-Process -Name terminal -ErrorAction SilentlyContinue | Stop-Process -Force

      - name: Locate MT4 metaeditor
        id: mt4editor
        shell: pwsh
        run: |
          $found = Get-ChildItem -Path 'C:\Program Files (x86)','C:\Program Files' `
                                 -Recurse -Filter 'metaeditor.exe' `
                                 -ErrorAction SilentlyContinue `
                   | Where-Object { $_.FullName -notmatch 'MetaTrader 5' } `
                   | Select-Object -First 1
          if (-not $found) { throw 'MT4 metaeditor.exe not found' }
          "path=$($found.FullName)" >> $env:GITHUB_OUTPUT

      - name: Compile CascadaBridge.mq4 → .ex4
        shell: pwsh
        run: |
          $editor = '${{ steps.mt4editor.outputs.path }}'
          $src    = Join-Path $PWD 'ea\mt4\CascadaBridge.mq4'
          $log    = Join-Path $PWD 'mq4.log'
          $p = Start-Process -FilePath $editor `
                             -ArgumentList "/compile:$src","/log:$log" `
                             -Wait -PassThru -NoNewWindow
          Write-Host "metaeditor exit code: $($p.ExitCode)"
          if (Test-Path $log) { Get-Content -Path $log -Encoding Unicode -Raw }
          if (-not (Test-Path 'ea\mt4\CascadaBridge.ex4')) {
            throw 'compile failed: no .ex4 produced'
          }

      - name: Stage compiled binaries
        shell: bash
        run: |
          set -e
          mkdir -p ea/mt5/compiled ea/mt4/compiled
          mv -f ea/mt5/CascadaBridge.ex5 ea/mt5/compiled/CascadaBridge.ex5
          mv -f ea/mt4/CascadaBridge.ex4 ea/mt4/compiled/CascadaBridge.ex4

      # upload-artifact@v4 preserves each path's directory structure in
      # the archive. Copying into a flat staging folder keeps the
      # artifact simple (two files at the root) so the build job can
      # place them deterministically.
      - name: Flatten compiled binaries for upload
        shell: bash
        run: |
          set -e
          mkdir -p .artifacts/out
          cp -f ea/mt5/compiled/CascadaBridge.ex5 .artifacts/out/
          cp -f ea/mt4/compiled/CascadaBridge.ex4 .artifacts/out/

      - name: Upload compiled EAs
        uses: actions/upload-artifact@v4
        with:
          name: compiled-eas
          path: .artifacts/out/
          if-no-files-found: error

  build:
    needs: compile-eas
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: ubuntu-latest
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # Overwrite the in-repo .ex4/.ex5 with the freshly-compiled ones
      # from the compile-eas job. `include_bytes!` reads them from disk
      # at build time, so this is the single seam that decides what's
      # embedded into the Cascada installer.
      - name: Download compiled EAs
        uses: actions/download-artifact@v4
        with:
          name: compiled-eas
          path: .artifacts/compiled-eas

      - name: Install freshly-compiled EAs into repo layout
        shell: bash
        run: |
          set -e
          mkdir -p ea/mt5/compiled ea/mt4/compiled
          cp -f .artifacts/compiled-eas/CascadaBridge.ex5 ea/mt5/compiled/CascadaBridge.ex5
          cp -f .artifacts/compiled-eas/CascadaBridge.ex4 ea/mt4/compiled/CascadaBridge.ex4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev

      - name: Install npm deps
        run: npm ci

      - name: Build & release with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Minisign keypair that signs update artifacts (latest.json, .sig
          # files). The matching public key is baked into the app via
          # tauri.conf.json → plugins.updater.pubkey, so only builds signed
          # with THIS private key will be accepted as updates.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Cascada ${{ github.ref_name }}'
          releaseBody: |
            ## Downloads

            Pick the installer for your platform below.

            - **macOS** — `Cascada_*_universal.dmg` (Intel + Apple Silicon)
            - **Windows** — `Cascada_*_x64-setup.exe` or `.msi`
            - **Linux** — `.AppImage` (portable), `.deb` (Debian/Ubuntu) or `.rpm` (Fedora/openSUSE)

            ### First-launch guide (unsigned build)

            - **macOS** → right-click the app → *Open* → confirm. If Gatekeeper blocks: `xattr -d com.apple.quarantine /Applications/Cascada.app`. Grant **Full Disk Access** once to silence the "access data from other apps" prompt.
            - **Windows** → SmartScreen: *More info* → *Run anyway*.
            - **Linux** AppImage → `chmod +x Cascada_*.AppImage && ./Cascada_*.AppImage`.

            Full install walk-through: see the [README](https://github.com/flocom/Cascada#running-an-unsigned-build).
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
